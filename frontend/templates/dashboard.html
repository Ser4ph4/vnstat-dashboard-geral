<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vnstat — Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #0f1520;
      --surface2: #151d2b;
      --border: #1e293b;
      --accent: #38bdf8;
      --accent2: #22d3ee;
      --accent3: #818cf8;
      --text: #e2e8f0;
      --text-dim: #cbd5e1;
      --muted: #64748b;
      --rx: #38bdf8;
      --tx: #f472b6;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 120% 80% at 50% 20%, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      background: rgba(15, 21, 32, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 600;
    }

    .header-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .user-badge {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-logout {
      padding: 9px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #f87171;
      color: #fda4af;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 28px;
      max-width: 1480px;
      margin: 0 auto;
      width: 100%;
      overflow-y: auto;
    }

    .section-title {
      font-size: 13.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 36px 0 18px;
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .kpi-grid, .hosts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .hosts-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

    .kpi-card, .host-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .kpi-card:hover, .host-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }

    .kpi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .kpi-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: var(--mono); }
    .kpi-value { font-size: 28px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.04em; }
    .kpi-value.rx { color: var(--rx); }
    .kpi-value.tx { color: var(--tx); }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 20px;
    }

    .chart-card, .peak-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .chart-title, .peak-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      font-family: var(--mono);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    canvas { max-height: 340px; }

    footer {
      position: relative;
      z-index: 10;
      background: rgba(15, 21, 32, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 14px 28px;
      font-size: 12.5px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .load-time { font-weight: 500; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      padding: 80px 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      main { padding: 16px; }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>
      <span>vn<span>dash</span></span>
    </div>
    <div class="header-right">
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> —</div>
      <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </header>

  <main>
    <div class="section-title"><i class="fa-solid fa-chart-pie"></i> Agregado Total</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading"><div class="spinner"></div> Carregando...</div>
    </div>

    <div class="section-title"><i class="fa-solid fa-network-wired"></i> Hosts</div>
    <div class="hosts-grid" id="hostsGrid">
      <div class="loading"><div class="spinner"></div> Carregando...</div>
    </div>

    <div class="section-title"><i class="fa-solid fa-chart-line"></i> Gráficos</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Últimos 30 dias (por host)</div>
        <canvas id="dailyChart"></canvas>
      </div>

      <div class="peak-card">
        <div class="peak-title"><i class="fa-solid fa-fire"></i> Top 10 Picos de Tráfego</div>
        <canvas id="peaksChart"></canvas>
      </div>

      <div class="chart-card">
        <div class="chart-title">Últimos 12 meses (agregado)</div>
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
  </main>

  <footer>
    <div>vnstat • Monitoramento em tempo real</div>
    <div class="load-time" id="loadTime">Carregado em — ms</div>
    <div>Auto-refresh • 30s</div>
  </footer>

  <script>
    let dailyChartInstance = null;
    let monthlyChartInstance = null;
    let peaksChartInstance = null;
    let startTime = performance.now();

    document.addEventListener('DOMContentLoaded', () => {
      loadUser();
      loadOverview();
      loadCharts();
      setInterval(() => {
        startTime = performance.now();
        loadOverview();
        loadCharts();
      }, 30000);
    });

    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) throw new Error('Unauthorized');
        const data = await res.json();
        document.getElementById('userBadge').innerHTML = `<i class="fa-solid fa-user"></i> @ ${data.username}`;
      } catch (err) {
        window.location.href = '/login';
      }
    }

    async function loadOverview() {
      try {
        const res = await fetch('/api/overview');
        const data = await res.json();

        document.getElementById('kpiGrid').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-header"><div class="kpi-label">Total Recebido</div><i class="fa-solid fa-cloud-arrow-down kpi-icon"></i></div>
            <div class="kpi-value">${data.total_rx_fmt}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header"><div class="kpi-label">Total Enviado</div><i class="fa-solid fa-cloud-arrow-up kpi-icon"></i></div>
            <div class="kpi-value">${data.total_tx_fmt}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header"><div class="kpi-label">Total Mês</div><i class="fa-solid fa-calendar-days kpi-icon"></i></div>
            <div class="kpi-value">${data.month_rx_fmt}</div>
            <div class="kpi-subtext">↓ + ${data.month_tx_fmt} ↑</div>
          </div>
        `;

        document.getElementById('hostsGrid').innerHTML = data.hosts.map(h => `
          <div class="host-card" onclick="goToHost('${h.name}')">
            <div class="host-card-header">
              <div class="host-title-wrapper">
                <i class="fa-solid fa-server host-icon"></i>
                <div class="host-name">${h.display_name}</div>
              </div>
              <div class="host-status ${h.online ? 'online' : 'offline'}"></div>
            </div>
            <div class="host-stat"><div class="host-stat-label">Recebido Total</div><div class="host-stat-value rx">${h.rx_total_fmt}</div></div>
            <div class="host-stat"><div class="host-stat-label">Enviado Total</div><div class="host-stat-value tx">${h.tx_total_fmt}</div></div>
          </div>
        `).join('');

        updateLoadTime();
      } catch (err) {
        console.error('loadOverview:', err);
      }
    }

    async function loadCharts() {
      startTime = performance.now();
      try {
        const [daily, monthly, peaks] = await Promise.all([
          fetch('/api/chart/daily?days=30').then(r => r.json()),
          fetch('/api/chart/monthly').then(r => r.json()),
          fetch('/api/chart/peaks').then(r => r.json())
        ]);

        // Daily Chart
        if (dailyChartInstance) dailyChartInstance.destroy();
        dailyChartInstance = new Chart(document.getElementById('dailyChart'), { /* ... seu código original ... */ });

        // Monthly Chart
        if (monthlyChartInstance) monthlyChartInstance.destroy();
        monthlyChartInstance = new Chart(document.getElementById('monthlyChart'), { /* ... seu código original ... */ });

        // Peaks Chart
        if (peaksChartInstance) peaksChartInstance.destroy();
        const peaksCtx = document.getElementById('peaksChart').getContext('2d');
        peaksChartInstance = new Chart(peaksCtx, {
          type: 'bar',
          data: {
            labels: peaks.map(p => p.date),
            datasets: [
              { label: 'Download (↓)', data: peaks.map(p => p.rx), backgroundColor: '#f87171cc', borderColor: '#ef4444', borderWidth: 1.5, borderRadius: 4 },
              { label: 'Upload (↑)', data: peaks.map(p => p.tx), backgroundColor: '#fb923ccc', borderColor: '#f59e0b', borderWidth: 1.5, borderRadius: 4 }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#cbd5e1', font: { family: 'IBM Plex Mono', size: 12 } } },
              tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatBytes(ctx.parsed.y)}` } }
            },
            scales: {
              x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { family: 'IBM Plex Mono', size: 11 } } },
              y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { family: 'IBM Plex Mono', size: 11 }, callback: v => formatBytes(v) } }
            }
          }
        });

        updateLoadTime();
      } catch (err) {
        console.error('[charts] ERRO:', err);
      }
    }

    function updateLoadTime() {
      const loadTime = (performance.now() - startTime).toFixed(0);
      document.getElementById('loadTime').innerHTML = `Carregado em <strong>${loadTime}</strong> ms`;
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    function goToHost(name) { window.location.href = `/host/${name}`; }

    async function doLogout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  </script>
</body>
</html>
