<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vnstat — Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e14;
      --surface: #0f1520;
      --surface2: #151d2b;
      --surface3: #1a2332;
      --border: #1e293b;
      --border-light: #2d3e52;
      --accent: #38bdf8;
      --accent2: #34d399;
      --accent3: #818cf8;
      --accent-warm: #f97316;
      --text: #e2e8f0;
      --text-dim: #cbd5e1;
      --muted: #64748b;
      --rx: #38bdf8;
      --tx: #f472b6;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 80% at 50% 0%, #0f172a44 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, var(--surface) 0%, rgba(15, 21, 32, 0.8) 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
    }

    .header-logo-icon svg {
      width: 20px;
      height: 20px;
    }

    .header-logo span {
      color: var(--accent);
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(100, 116, 139, 0.1);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .btn-logout {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: var(--mono);
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-logout:hover {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: rgba(249, 115, 22, 0.1);
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 32px 24px 120px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      overflow-y: auto;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 18px;
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      color: var(--accent);
      font-size: 14px;
    }

    /* ── KPI Cards ──────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .kpi-card {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity .3s;
    }

    .kpi-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.2);
      transform: translateY(-2px);
    }

    .kpi-card:hover::before {
      opacity: 1;
    }

    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }

    .kpi-icon {
      font-size: 16px;
      color: var(--accent);
      transition: all .3s;
    }

    .kpi-card:hover .kpi-icon {
      transform: scale(1.2) rotate(5deg);
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--mono);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }

    .kpi-subtext {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--mono);
      position: relative;
      z-index: 1;
    }

    .kpi-live {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .7;
      }
    }

    /* ── Host Cards ─────────────────────────────────────────────────── */
    .hosts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    .host-card {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      cursor: pointer;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .host-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.05) 0%, transparent 100%);
      opacity: 0;
      transition: opacity .3s;
    }

    .host-card:hover {
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(56, 189, 248, 0.25);
      transform: translateY(-4px);
    }

    .host-card:hover::before {
      opacity: 1;
    }

    .host-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .host-title-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .host-icon {
      font-size: 16px;
      color: var(--accent);
      transition: all .3s;
    }

    .host-card:hover .host-icon {
      transform: scale(1.15);
    }

    .host-name {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
    }

    .host-status {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 8px currentColor;
    }

    .host-status.online {
      background: #34d399;
    }

    .host-status.offline {
      background: var(--muted);
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 8px currentColor;
      }

      50% {
        opacity: .6;
        box-shadow: 0 0 4px currentColor;
      }
    }

    .host-stat {
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .host-stat-label {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .host-stat-value {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--mono);
      margin-top: 4px;
    }

    .host-stat-value.rx {
      color: var(--rx);
    }

    .host-stat-value.tx {
      color: var(--tx);
    }

    /* ── Charts ────────────────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    .chart-card {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: all .3s;
    }

    .chart-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.15);
    }

    .chart-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      font-family: var(--mono);
      color: var(--text);
    }

    canvas {
      max-height: 300px;
    }

    /* ── Loading ────────────────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(15, 21, 32, 0) 0%, var(--surface) 50%, var(--surface) 100%);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .footer-content {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
      justify-content: flex-end;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-family: var(--mono);
      padding: 8px 14px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 8px;
      transition: all .3s;
    }

    .api-status:hover {
      background: rgba(56, 189, 248, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
    }

    .api-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse-status 2s ease-in-out infinite;
      box-shadow: 0 0 6px #34d399;
    }

    .api-status-dot.error {
      background: #ef4444;
      animation: pulse-status-error 1s ease-in-out infinite;
      box-shadow: 0 0 6px #ef4444;
    }

    @keyframes pulse-status {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px #34d399;
      }

      50% {
        opacity: 0.6;
        box-shadow: 0 0 3px #34d399;
      }
    }

    @keyframes pulse-status-error {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px #ef4444;
      }

      50% {
        opacity: 0.5;
        box-shadow: 0 0 3px #ef4444;
      }
    }

    .api-status-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .api-status-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .api-status-value {
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
    }

    .api-status-value.error {
      color: #ef4444;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      main {
        padding: 24px 16px 140px;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .hosts-grid {
        grid-template-columns: 1fr;
      }

      footer {
        padding: 12px 16px;
      }

      .footer-content {
        gap: 12px;
      }

      .api-status {
        padding: 6px 10px;
        font-size: 11px;
      }

      .api-status-text {
        gap: 1px;
      }

      .api-status-label {
        font-size: 9px;
      }

      .api-status-value {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>
      <span>vn<span>dash</span></span>
    </div>
    <div class="header-right">
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> —</div>
      <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </header>

  <main>
    <div class="section-title"><i class="fa-solid fa-chart-pie"></i> Agregado Total</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-title" style="margin-top: 32px;"><i class="fa-solid fa-network-wired"></i> Hosts</div>
    <div class="hosts-grid" id="hostsGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-title" style="margin-top: 32px;"><i class="fa-solid fa-chart-line"></i> Gráficos</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Últimos 30 dias (por host)</div>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Últimos 12 meses (agregado)</div>
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="api-status" id="apiStatus">
        <div class="api-status-dot"></div>
        <div class="api-status-text">
          <div class="api-status-label">API Status</div>
          <div class="api-status-value">—</div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    let dailyChartInstance = null;
    let monthlyChartInstance = null;
    let apiLatency = 0;

    // ── Init ────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadUser();
      loadOverview();
      loadCharts();
      checkApiStatus();
      // Refresh every 30 seconds
      setInterval(loadOverview, 30000);
      // Check API status every 5 seconds
      setInterval(checkApiStatus, 5000);
    });

    async function checkApiStatus() {
      try {
        const startTime = performance.now();
        const res = await fetch('/api/health', { method: 'HEAD' });
        const endTime = performance.now();
        apiLatency = Math.round(endTime - startTime);

        const statusEl = document.getElementById('apiStatus');
        const dot = statusEl.querySelector('.api-status-dot');
        const value = statusEl.querySelector('.api-status-value');

        if (res.ok) {
          dot.classList.remove('error');
          value.classList.remove('error');
          value.textContent = `${apiLatency}ms`;
        } else {
          dot.classList.add('error');
          value.classList.add('error');
          value.textContent = 'Erro';
        }
      } catch (err) {
        const statusEl = document.getElementById('apiStatus');
        const dot = statusEl.querySelector('.api-status-dot');
        const value = statusEl.querySelector('.api-status-value');
        dot.classList.add('error');
        value.classList.add('error');
        value.textContent = 'Desconectado';
        console.error('API status check failed:', err);
      }
    }

    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) throw new Error('Unauthorized');
        const data = await res.json();
        document.getElementById('userBadge').innerHTML = `<i class="fa-solid fa-user"></i> @ ${data.username}`;
      } catch (err) {
        window.location.href = '/login';
      }
    }

    async function loadOverview() {
      try {
        const data = await fetch('/api/overview').then(r => r.json());

        const kpiGrid = document.getElementById('kpiGrid');
        kpiGrid.innerHTML = `
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Recebido (cumulative)</div>
              <i class="fa-solid fa-cloud-arrow-down kpi-icon"></i>
            </div>
            <div class="kpi-value">${data.total_rx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_rx)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Enviado (cumulative)</div>
              <i class="fa-solid fa-cloud-arrow-up kpi-icon"></i>
            </div>
            <div class="kpi-value">${data.total_tx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_tx)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Mês</div>
              <i class="fa-solid fa-calendar-days kpi-icon"></i>
            </div>
            <div class="kpi-value">${data.month_rx_fmt}</div>
            <div class="kpi-subtext">↓ + ${data.month_tx_fmt} ↑</div>
          </div>
        `;

        // Host cards
        const hostsGrid = document.getElementById('hostsGrid');
        hostsGrid.innerHTML = data.hosts.map(h => `
          <div class="host-card" onclick="goToHost('${h.name}')">
            <div class="host-card-header">
              <div class="host-title-wrapper">
                <i class="fa-solid fa-server host-icon"></i>
                <div class="host-name">${h.display_name}</div>
              </div>
              <div class="host-status ${h.online ? 'online' : 'offline'}" title="${h.online ? 'Online' : 'Offline'}"></div>
            </div>
            <div class="host-stat">
              <div class="host-stat-label">Recebido Total</div>
              <div class="host-stat-value rx">${h.rx_total_fmt}</div>
            </div>
            <div class="host-stat">
              <div class="host-stat-label">Enviado Total</div>
              <div class="host-stat-value tx">${h.tx_total_fmt}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('loadOverview:', err);
      }
    }

    async function apiFetch(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Erro na requisição (${response.status}): ${response.statusText}`);
      }
      return response.json();
    }

    async function loadCharts() {
      try {
        const [daily, monthly] = await Promise.all([
          apiFetch('/api/chart/daily?days=30'),
          apiFetch('/api/chart/monthly'),
        ]);

        const baseOpts = (type) => ({
          responsive: true,
          maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#cbd5e1', font: { family: 'IBM Plex Mono, monospace', size: 11 }, padding: 16, usePointStyle: true } },
            tooltip: {
              backgroundColor: '#0f172a', borderColor: '#38bdf8', borderWidth: 1,
              titleFont: { family: 'IBM Plex Mono, monospace', size: 12 },
              bodyFont: { family: 'IBM Plex Mono, monospace', size: 11 },
              callbacks: { label: ctx => ctx.dataset.label + ': ' + formatBytes(ctx.parsed.y) },
            },
          },
          scales: {
            x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', maxTicksLimit: 10, font: { family: 'IBM Plex Mono, monospace', size: 10 } } },
            y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { family: 'IBM Plex Mono, monospace', size: 10 }, callback: v => formatBytes(v) } },
          },
        });

        // ── Daily chart ──────────────────────────────────────────────────
        if (!daily.labels || daily.labels.length === 0) {
          showEmptyChart('dailyChart', 'Aguardando dados (próximos ciclos do coletor)');
        } else {
          const dailyCtx = document.getElementById('dailyChart').getContext('2d');
          if (dailyChartInstance) dailyChartInstance.destroy();

          const RX_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const TX_COLORS = ['#f472b6', '#fb923c', '#facc15'];

          const hostNames = [...new Set(daily.datasets.map(d => d.host))];
          const cleanDatasets = [];

          hostNames.forEach((host, i) => {
            const rxDs = daily.datasets.find(d => d.host === host && d.type === 'rx');
            const txDs = daily.datasets.find(d => d.host === host && d.type === 'tx');

            if (rxDs) cleanDatasets.push({
              label: rxDs.label,
              data: rxDs.data.map(Number),
              backgroundColor: RX_COLORS[i % RX_COLORS.length] + 'cc',
              borderColor: RX_COLORS[i % RX_COLORS.length],
              borderRadius: 3, borderWidth: 1,
            });
            if (txDs) cleanDatasets.push({
              label: txDs.label,
              data: txDs.data.map(Number),
              backgroundColor: TX_COLORS[i % TX_COLORS.length] + 'cc',
              borderColor: TX_COLORS[i % TX_COLORS.length],
              borderRadius: 3, borderWidth: 1,
            });
          });

          dailyChartInstance = new Chart(dailyCtx, {
            type: 'bar',
            data: { labels: daily.labels, datasets: cleanDatasets },
            options: baseOpts('bar'),
          });
        }

        // ── Monthly chart ────────────────────────────────────────────────
        if (!monthly.labels || monthly.labels.length === 0) {
          showEmptyChart('monthlyChart', 'Aguardando dados mensais');
        } else {
          const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
          if (monthlyChartInstance) monthlyChartInstance.destroy();

          const M_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const cleanMonthly = [];

          monthly.datasets.forEach((ds, i) => {
            const c = M_COLORS[i % M_COLORS.length];
            cleanMonthly.push({
              label: ds.label + ' ↓',
              data: (ds.rx || []).map(Number),
              borderColor: c, backgroundColor: c + '33',
              borderWidth: 2, tension: 0.4, fill: true,
              pointRadius: 4, pointHoverRadius: 6,
            });
            cleanMonthly.push({
              label: ds.label + ' ↑',
              data: (ds.tx || []).map(Number),
              borderColor: c + 'aa', backgroundColor: 'transparent',
              borderWidth: 1.5, tension: 0.4, fill: false, borderDash: [4, 3],
              pointRadius: 3, pointHoverRadius: 5,
            });
          });

          monthlyChartInstance = new Chart(monthlyCtx, {
            type: 'line',
            data: { labels: monthly.labels, datasets: cleanMonthly },
            options: baseOpts('line'),
          });
        }
      } catch (err) {
        console.error('[charts] ERRO:', err);
      }
    }

    function showEmptyChart(canvasId, msg) {
      const canvas = document.getElementById(canvasId);
      const parent = canvas.parentElement;
      canvas.style.display = 'none';
      if (!parent.querySelector('.empty-msg')) {
        const el = document.createElement('div');
        el.className = 'empty-msg';
        el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-family:var(--mono);font-size:13px;gap:8px;';
        el.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
        parent.appendChild(el);
      }
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    function goToHost(name) {
      window.location.href = `/host/${name}`;
    }

    async function doLogout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
      } finally {
        window.location.href = '/login';
      }
    }
  </script>
</body>
