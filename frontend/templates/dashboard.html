<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VnStat — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
  <link rel="stylesheet" href="/static/css/all.min.css">
  <link rel="stylesheet" href="/static/css/fonts.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/chart.umd.min.js"></script>
</head>

<body>
  <header>
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>
      <span>Vn<span>Stat - Dashboard</span></span>
    </div>
    <div class="header-right">
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> —</div>
      <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </header>

  <main>
    <div class="section-title"><i class="fa-solid fa-chart-pie"></i> Agregado Total</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-title" style="margin-top: 32px;"><i class="fa-solid fa-network-wired"></i> Hosts</div>
    <div class="hosts-grid" id="hostsGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-title" style="margin-top: 32px;"><i class="fa-solid fa-chart-line"></i> Gráficos</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Últimos 30 dias (host)</div>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Últimos 12 meses (agregado)</div>
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
  </main>

  <script>
    let dailyChartInstance = null;
    let monthlyChartInstance = null;

    // ── Init ────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadUser();
      loadOverview();
      loadCharts();
      // Refresh every 30 seconds
      setInterval(loadOverview, 30000);
    });

    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');

        if (res.status === 401 || res.status === 403) {
          window.location.href = '/login';
          return;
        }

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        document.getElementById('userBadge').innerHTML = `<i class="fa-solid fa-user"></i> @ ${data.username}`;
      } catch (err) {
        console.error('Erro ao verificar usuário (pode ser lentidão):', err);
      }
    }

    async function loadOverview() {
      try {
        const res = await fetch('/api/overview');
        const data = await res.json();

        const kpiGrid = document.getElementById('kpiGrid');
        kpiGrid.innerHTML = `
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Recebido</div>
              <i class="fa-solid fa-cloud-arrow-down kpi-icon"></i>
            </div>
            <div class="kpi-value">${data.total_rx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_rx)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Enviado</div>
              <i class="fa-solid fa-cloud-arrow-up kpi-icon"></i>
            </div>
            <div class="kpi-value">${data.total_tx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_tx)}</div>
          </div>
<div class="kpi-card">
  <div class="kpi-header">
    <div class="kpi-label">Total Mês</div>
    <i class="fa-solid fa-calendar-days kpi-icon"></i>
  </div>
  <div style="display: flex; gap: 16px; margin-top: 6px;">
    <div style="flex: 1;">
      <div class="kpi-value" style="color: var(--rx); font-size: 20px; margin-bottom: 0;">${data.month_rx_fmt}</div>
      <div class="kpi-subtext" style="font-size: 11px; margin-top: 2px; color: var(--muted);"><i class="fa-solid fa-arrow-down" style="color: var(--rx);"></i> Down</div>
    </div>
    <div style="flex: 1; border-left: 1px solid var(--border); padding-left: 16px;">
      <div class="kpi-value" style="color: var(--tx); font-size: 20px; margin-bottom: 0;">${data.month_tx_fmt}</div>
      <div class="kpi-subtext" style="font-size: 11px; margin-top: 2px; color: var(--muted);"><i class="fa-solid fa-arrow-up" style="color: var(--tx);"></i> Up</div>
    </div>
  </div>
</div>
        `;

        // Host cards
        const hostsGrid = document.getElementById('hostsGrid');
        hostsGrid.innerHTML = data.hosts.map(h => `
          <div class="host-card" onclick="goToHost('${h.name}')">
            <div class="host-card-header">
              <div class="host-title-wrapper">
                <i class="fa-solid fa-server host-icon"></i>
                <div class="host-name">${h.display_name}</div>
              </div>
              <div class="host-status ${h.online ? 'online' : 'offline'}" title="${h.online ? 'Online' : 'Offline'}"></div>
            </div>
            <div class="host-stat">
              <div class="host-stat-label">Recebido Total</div>
              <div class="host-stat-value rx">${h.rx_total_fmt}</div>
            </div>
            <div class="host-stat">
              <div class="host-stat-label">Enviado Total</div>
              <div class="host-stat-value tx">${h.tx_total_fmt}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('loadOverview:', err);
      }
    }

    async function apiFetch(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Erro na requisição (${response.status}): ${response.statusText}`);
      }
      return response.json();
    }

    async function loadCharts() {
      try {
        const [daily, monthly] = await Promise.all([
          apiFetch('/api/chart/daily?days=30'),
          apiFetch('/api/chart/monthly'),
        ]);

        const baseOpts = (type) => ({
          responsive: true,
          maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#cbd5e1', font: { family: 'IBM Plex Mono, monospace', size: 11 }, padding: 16, usePointStyle: true } },
            tooltip: {
              backgroundColor: '#0f172a', borderColor: '#38bdf8', borderWidth: 1,
              titleFont: { family: 'IBM Plex Mono, monospace', size: 12 },
              bodyFont: { family: 'IBM Plex Mono, monospace', size: 11 },
              callbacks: { label: ctx => ctx.dataset.label + ': ' + formatBytes(ctx.parsed.y) },
            },
          },
          scales: {
            x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', maxTicksLimit: 10, font: { family: 'IBM Plex Mono, monospace', size: 10 } } },
            y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { family: 'IBM Plex Mono, monospace', size: 10 }, callback: v => formatBytes(v) } },
          },
        });

        // ── Daily chart ──────────────────────────────────────────────────
        if (!daily.labels || daily.labels.length === 0) {
          showEmptyChart('dailyChart', 'Aguardando dados (próximos ciclos do coletor)');
        } else {
          const dailyCtx = document.getElementById('dailyChart').getContext('2d');
          if (dailyChartInstance) dailyChartInstance.destroy();

          const RX_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const TX_COLORS = ['#f472b6', '#fb923c', '#facc15'];

          const hostNames = [...new Set(daily.datasets.map(d => d.host))];
          const cleanDatasets = [];

          hostNames.forEach((host, i) => {
            const rxDs = daily.datasets.find(d => d.host === host && d.type === 'rx');
            const txDs = daily.datasets.find(d => d.host === host && d.type === 'tx');

            if (rxDs) cleanDatasets.push({
              label: rxDs.label,
              data: rxDs.data.map(Number),
              backgroundColor: RX_COLORS[i % RX_COLORS.length] + 'cc',
              borderColor: RX_COLORS[i % RX_COLORS.length],
              borderRadius: 3, borderWidth: 1,
            });
            if (txDs) cleanDatasets.push({
              label: txDs.label,
              data: txDs.data.map(Number),
              backgroundColor: TX_COLORS[i % TX_COLORS.length] + 'cc',
              borderColor: TX_COLORS[i % TX_COLORS.length],
              borderRadius: 3, borderWidth: 1,
            });
          });

          dailyChartInstance = new Chart(dailyCtx, {
            type: 'bar',
            data: { labels: daily.labels, datasets: cleanDatasets },
            options: baseOpts('bar'),
          });
        }

        // ── Monthly chart ────────────────────────────────────────────────
        if (!monthly.labels || monthly.labels.length === 0) {
          showEmptyChart('monthlyChart', 'Aguardando dados mensais');
        } else {
          const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
          if (monthlyChartInstance) monthlyChartInstance.destroy();

          const M_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const cleanMonthly = [];

          monthly.datasets.forEach((ds, i) => {
            const c = M_COLORS[i % M_COLORS.length];
            cleanMonthly.push({
              label: ds.label + ' ↓',
              data: (ds.rx || []).map(Number),
              borderColor: c, backgroundColor: c + '33',
              borderWidth: 2, tension: 0.4, fill: true,
              pointRadius: 4, pointHoverRadius: 6,
            });
            cleanMonthly.push({
              label: ds.label + ' ↑',
              data: (ds.tx || []).map(Number),
              borderColor: c + 'aa', backgroundColor: 'transparent',
              borderWidth: 1.5, tension: 0.4, fill: false, borderDash: [4, 3],
              pointRadius: 3, pointHoverRadius: 5,
            });
          });

          monthlyChartInstance = new Chart(monthlyCtx, {
            type: 'line',
            data: { labels: monthly.labels, datasets: cleanMonthly },
            options: baseOpts('line'),
          });
        }
      } catch (err) {
        console.error('[charts] ERRO:', err);
      }
    }

    function showEmptyChart(canvasId, msg) {
      const canvas = document.getElementById(canvasId);
      const parent = canvas.parentElement;
      canvas.style.display = 'none';
      if (!parent.querySelector('.empty-msg')) {
        const el = document.createElement('div');
        el.className = 'empty-msg';
        el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-family:var(--mono);font-size:13px;gap:8px;';
        el.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
        parent.appendChild(el);
      }
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    function goToHost(name) {
      window.location.href = `/host/${name}`;
    }

    async function doLogout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
      } finally {
        window.location.href = '/login';
      }
    }
  </script>
</body>

</html>
