<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vnstat — Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e14;
      --surface: #0d1117;
      --surface2: #111827;
      --surface3: #1a2233;
      --border: #1e293b;
      --border-subtle: #162032;
      --accent: #38bdf8;
      --accent2: #34d399;
      --accent3: #818cf8;
      --accent-glow: rgba(56, 189, 248, 0.12);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --muted: #475569;
      --rx: #38bdf8;
      --tx: #f472b6;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
      --radius: 10px;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30, 41, 59, 0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 41, 59, 0.4) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(56, 189, 248, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      background: rgba(13, 17, 23, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .header-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo-icon svg {
      width: 16px;
      height: 16px;
    }

    .header-logo em {
      font-style: normal;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-badge {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-logout {
      padding: 7px 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      font-family: var(--mono);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-logout:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    /* ── Main ───────────────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 28px 24px;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin: 32px 0 14px;
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    .section-label:first-child {
      margin-top: 0;
    }

    /* ── KPI Cards ──────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .kpi-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }

    .kpi-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(56, 189, 248, 0.08);
    }

    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: var(--mono);
    }

    .kpi-icon {
      font-size: 12px;
      color: var(--muted);
      transition: color .2s;
    }

    .kpi-card:hover .kpi-icon {
      color: var(--accent);
    }

    .kpi-value {
      font-size: 22px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .kpi-subtext {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .kpi-live {
      animation: kpipulse 2.5s ease-in-out infinite;
    }

    @keyframes kpipulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .65;
      }
    }

    /* ── Host Cards ─────────────────────────────────────────────────── */
    .hosts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }

    .host-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .host-card:hover {
      border-color: var(--accent);
      background: var(--surface3);
      box-shadow: 0 4px 24px rgba(56, 189, 248, 0.1);
    }

    .host-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .host-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .host-icon {
      font-size: 13px;
      color: var(--muted);
      transition: color .2s;
    }

    .host-card:hover .host-icon {
      color: var(--accent);
    }

    .host-name {
      font-size: 14px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .host-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .host-status.online {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      animation: pulse-status 2.5s ease-in-out infinite;
    }

    .host-status.offline {
      background: var(--muted);
    }

    @keyframes pulse-status {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .host-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .host-stat-block {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .host-stat-label {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .host-stat-value {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .host-stat-value.rx {
      color: var(--rx);
    }

    .host-stat-value.tx {
      color: var(--tx);
    }

    .host-card-arrow {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 12px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      gap: 4px;
      opacity: 0;
      transition: opacity .2s;
    }

    .host-card:hover .host-card-arrow {
      opacity: 1;
    }

    /* ── Charts ─────────────────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 12px;
    }

    .chart-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .chart-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .chart-header i {
      color: var(--muted);
      font-size: 12px;
    }

    .chart-badge {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }

    canvas {
      max-height: 280px;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 10;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 0 24px;
    }

    .footer-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 0;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0;
      align-items: start;
    }

    .footer-group {
      padding: 0 20px;
      border-right: 1px solid var(--border-subtle);
    }

    .footer-group:first-child {
      padding-left: 0;
    }

    .footer-group:last-child {
      border-right: none;
      padding-right: 0;
      display: flex;
      align-items: center;
    }

    .footer-group-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 10px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 4px;
    }

    .footer-row:last-child {
      margin-bottom: 0;
    }

    .footer-key {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      white-space: nowrap;
    }

    .footer-val {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      font-weight: 500;
    }

    .footer-val.rx {
      color: var(--rx);
    }

    .footer-val.tx {
      color: var(--tx);
    }

    .footer-hosts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .footer-host-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }

    .footer-host-pill .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
    }

    .footer-host-pill .dot.off {
      background: var(--muted);
    }

    .footer-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      white-space: nowrap;
    }

    .footer-refresh i {
      font-size: 10px;
      color: var(--accent);
    }

    .footer-bottom {
      border-top: 1px solid var(--border-subtle);
      margin-top: 14px;
      padding-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-brand span {
      color: var(--accent);
    }

    .footer-meta {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
    }

    /* ── Spinner / Empty ────────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      padding: 20px 0;
      width: 100%;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .footer-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .footer-group {
        border-right: none;
        padding: 0;
      }
    }

    @media (max-width: 600px) {
      main {
        padding: 16px;
      }

      header,
      footer {
        padding: 0 16px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .hosts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>
      vn<em>dash</em>
    </div>
    <div class="header-right">
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> —</div>
      <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </header>

  <main>
    <div class="section-label"><i class="fa-solid fa-chart-pie"></i> Agregado Total</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-network-wired"></i> Hosts</div>
    <div class="hosts-grid" id="hostsGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-chart-line"></i> Gráficos</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-header-left">
            <i class="fa-solid fa-chart-bar"></i>
            <div class="chart-title">Últimos 30 dias (por host)</div>
          </div>
          <div class="chart-badge">30 dias</div>
        </div>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-header-left">
            <i class="fa-solid fa-chart-line"></i>
            <div class="chart-title">Últimos 12 meses (agregado)</div>
          </div>
          <div class="chart-badge">12 meses</div>
        </div>
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-grid">

        <!-- Agregado RX/TX -->
        <div class="footer-group">
          <div class="footer-group-label"><i class="fa-solid fa-chart-pie"></i> Tráfego Total</div>
          <div class="footer-row">
            <div class="footer-key">↓ Recebido</div>
            <div class="footer-val rx" id="fTotalRx">—</div>
          </div>
          <div class="footer-row">
            <div class="footer-key">↑ Enviado</div>
            <div class="footer-val tx" id="fTotalTx">—</div>
          </div>
          <div class="footer-row">
            <div class="footer-key">Este mês</div>
            <div class="footer-val" id="fMonthSum">—</div>
          </div>
        </div>

        <!-- Mês corrente -->
        <div class="footer-group">
          <div class="footer-group-label"><i class="fa-solid fa-calendar-days"></i> Mês Corrente</div>
          <div class="footer-row">
            <div class="footer-key">↓ Recebido</div>
            <div class="footer-val rx" id="fMonthRx">—</div>
          </div>
          <div class="footer-row">
            <div class="footer-key">↑ Enviado</div>
            <div class="footer-val tx" id="fMonthTx">—</div>
          </div>
          <div class="footer-row">
            <div class="footer-key">Hosts ativos</div>
            <div class="footer-val" id="fHostsOnline">—</div>
          </div>
        </div>

        <!-- Hosts -->
        <div class="footer-group">
          <div class="footer-group-label"><i class="fa-solid fa-server"></i> Hosts</div>
          <div class="footer-hosts" id="fHostPills">—</div>
        </div>

        <!-- Última atualização -->
        <div class="footer-group">
          <div class="footer-refresh">
            <i class="fa-solid fa-rotate"></i>
            <span id="fLastUpdate">Atualizando...</span>
          </div>
        </div>

      </div>

      <div class="footer-bottom">
        <div class="footer-brand">
          <i class="fa-solid fa-chart-area"></i>
          vn<span>dash</span>
        </div>
        <div class="footer-meta" id="fFooterMeta">atualiza a cada 30s</div>
      </div>
    </div>
  </footer>

  <script>
    let dailyChartInstance = null;
    let monthlyChartInstance = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadUser();
      loadOverview();
      loadCharts();
      setInterval(loadOverview, 30000);
    });

    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) throw new Error('Unauthorized');
        const data = await res.json();
        document.getElementById('userBadge').innerHTML = `<i class="fa-solid fa-user"></i> ${data.username}`;
      } catch {
        window.location.href = '/login';
      }
    }

    async function loadOverview() {
      try {
        const res = await fetch('/api/overview');
        const data = await res.json();

        // KPI Cards
        document.getElementById('kpiGrid').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Recebido</div>
              <i class="fa-solid fa-cloud-arrow-down kpi-icon"></i>
            </div>
            <div class="kpi-value" style="color:var(--rx)">${data.total_rx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_rx)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Enviado</div>
              <i class="fa-solid fa-cloud-arrow-up kpi-icon"></i>
            </div>
            <div class="kpi-value" style="color:var(--tx)">${data.total_tx_fmt}</div>
            <div class="kpi-subtext">${formatBytes(data.total_tx)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Mês</div>
              <i class="fa-solid fa-calendar-days kpi-icon"></i>
            </div>
            <div class="kpi-value kpi-live">${data.month_rx_fmt}</div>
            <div class="kpi-subtext">↓ + ${data.month_tx_fmt} ↑</div>
          </div>
        `;

        // Host cards
        document.getElementById('hostsGrid').innerHTML = data.hosts.map(h => `
          <div class="host-card" onclick="goToHost('${h.name}')">
            <div class="host-card-header">
              <div class="host-title-wrapper">
                <i class="fa-solid fa-server host-icon"></i>
                <div class="host-name">${h.display_name}</div>
              </div>
              <div class="host-status ${h.online ? 'online' : 'offline'}" title="${h.online ? 'Online' : 'Offline'}"></div>
            </div>
            <div class="host-stats">
              <div class="host-stat-block">
                <div class="host-stat-label">↓ Recebido</div>
                <div class="host-stat-value rx">${h.rx_total_fmt}</div>
              </div>
              <div class="host-stat-block">
                <div class="host-stat-label">↑ Enviado</div>
                <div class="host-stat-value tx">${h.tx_total_fmt}</div>
              </div>
            </div>
            <div class="host-card-arrow">ver detalhes <i class="fa-solid fa-arrow-right"></i></div>
          </div>
        `).join('');

        // Footer
        setText('fTotalRx', data.total_rx_fmt || '—');
        setText('fTotalTx', data.total_tx_fmt || '—');
        setText('fMonthRx', data.month_rx_fmt || '—');
        setText('fMonthTx', data.month_tx_fmt || '—');

        const monthRx = data.month_rx || 0;
        const monthTx = data.month_tx || 0;
        setText('fMonthSum', formatBytes(monthRx + monthTx));

        const onlineCount = (data.hosts || []).filter(h => h.online).length;
        const totalCount = (data.hosts || []).length;
        setText('fHostsOnline', `${onlineCount} / ${totalCount}`);

        const pillsEl = document.getElementById('fHostPills');
        if (data.hosts && data.hosts.length) {
          pillsEl.innerHTML = data.hosts.map(h => `
            <div class="footer-host-pill">
              <div class="dot ${h.online ? '' : 'off'}"></div>
              ${h.display_name}
            </div>
          `).join('');
        }

        const now = new Date();
        setText('fLastUpdate', `${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`);
        setText('fFooterMeta', `${now.toLocaleDateString('pt-BR')} · atualiza a cada 30s`);

      } catch (err) {
        console.error('loadOverview:', err);
      }
    }

    async function apiFetch(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Erro (${response.status}): ${response.statusText}`);
      return response.json();
    }

    async function loadCharts() {
      try {
        const [daily, monthly] = await Promise.all([
          apiFetch('/api/chart/daily?days=30'),
          apiFetch('/api/chart/monthly'),
        ]);

        const baseOpts = () => ({
          responsive: true,
          maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: {
                color: '#94a3b8',
                font: { family: 'IBM Plex Mono, monospace', size: 11 },
                padding: 16,
                usePointStyle: true,
                pointStyleWidth: 8,
              }
            },
            tooltip: {
              backgroundColor: '#0d1117',
              borderColor: '#1e293b',
              borderWidth: 1,
              padding: 10,
              titleFont: { family: 'IBM Plex Mono, monospace', size: 12 },
              bodyFont: { family: 'IBM Plex Mono, monospace', size: 11 },
              callbacks: { label: ctx => `  ${ctx.dataset.label}: ${formatBytes(ctx.parsed.y)}` },
            },
          },
          scales: {
            x: {
              grid: { color: 'rgba(30,41,59,0.5)' },
              ticks: { color: '#475569', maxTicksLimit: 10, font: { family: 'IBM Plex Mono, monospace', size: 10 } }
            },
            y: {
              grid: { color: 'rgba(30,41,59,0.5)' },
              ticks: { color: '#475569', font: { family: 'IBM Plex Mono, monospace', size: 10 }, callback: v => formatBytes(v) }
            },
          },
        });

        // Daily
        if (!daily.labels || daily.labels.length === 0) {
          showEmptyChart('dailyChart', 'Aguardando dados');
        } else {
          const dailyCtx = document.getElementById('dailyChart').getContext('2d');
          if (dailyChartInstance) dailyChartInstance.destroy();

          const RX_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const TX_COLORS = ['#f472b6', '#fb923c', '#facc15'];
          const hostNames = [...new Set(daily.datasets.map(d => d.host))];
          const cleanDatasets = [];

          hostNames.forEach((host, i) => {
            const rxDs = daily.datasets.find(d => d.host === host && d.type === 'rx');
            const txDs = daily.datasets.find(d => d.host === host && d.type === 'tx');
            if (rxDs) cleanDatasets.push({
              label: rxDs.label,
              data: rxDs.data.map(Number),
              backgroundColor: RX_COLORS[i % RX_COLORS.length] + '22',
              borderColor: RX_COLORS[i % RX_COLORS.length],
              borderRadius: 3, borderWidth: 1.5,
            });
            if (txDs) cleanDatasets.push({
              label: txDs.label,
              data: txDs.data.map(Number),
              backgroundColor: TX_COLORS[i % TX_COLORS.length] + '22',
              borderColor: TX_COLORS[i % TX_COLORS.length],
              borderRadius: 3, borderWidth: 1.5,
            });
          });

          dailyChartInstance = new Chart(dailyCtx, {
            type: 'bar',
            data: { labels: daily.labels, datasets: cleanDatasets },
            options: baseOpts(),
          });
        }

        // Monthly
        if (!monthly.labels || monthly.labels.length === 0) {
          showEmptyChart('monthlyChart', 'Aguardando dados mensais');
        } else {
          const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
          if (monthlyChartInstance) monthlyChartInstance.destroy();

          const M_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
          const cleanMonthly = [];

          monthly.datasets.forEach((ds, i) => {
            const c = M_COLORS[i % M_COLORS.length];
            cleanMonthly.push({
              label: ds.label + ' ↓',
              data: (ds.rx || []).map(Number),
              borderColor: c,
              backgroundColor: c + '18',
              borderWidth: 2, tension: 0.35, fill: true,
              pointRadius: 3, pointHoverRadius: 5,
              pointBackgroundColor: c,
            });
            cleanMonthly.push({
              label: ds.label + ' ↑',
              data: (ds.tx || []).map(Number),
              borderColor: c + 'aa',
              backgroundColor: 'transparent',
              borderWidth: 1.5, tension: 0.35, fill: false,
              borderDash: [4, 3],
              pointRadius: 2, pointHoverRadius: 4,
            });
          });

          monthlyChartInstance = new Chart(monthlyCtx, {
            type: 'line',
            data: { labels: monthly.labels, datasets: cleanMonthly },
            options: baseOpts(),
          });
        }
      } catch (err) {
        console.error('[charts]', err);
      }
    }

    function showEmptyChart(canvasId, msg) {
      const canvas = document.getElementById(canvasId);
      const parent = canvas.parentElement;
      canvas.style.display = 'none';
      if (!parent.querySelector('.empty-msg')) {
        const el = document.createElement('div');
        el.className = 'empty-msg';
        el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:180px;color:#475569;font-family:var(--mono);font-size:12px;gap:8px;';
        el.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
        parent.appendChild(el);
      }
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    function goToHost(name) { window.location.href = `/host/${name}`; }

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST' }); }
      finally { window.location.href = '/login'; }
    }
  </script>
