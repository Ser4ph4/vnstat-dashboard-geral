<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VnStat — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
  <link rel="stylesheet" href="/static/css/all.min.css">
  <link rel="stylesheet" href="/static/css/fonts.css">
  <link rel="stylesheet" href="/static/css/style.css?v=3">
  <script src="/static/js/chart.umd.min.js"></script>
</head>

<body>
  <header>
    <div class="header-left">
      <a class="header-logo" href="/">
        <div class="header-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
        </div>
        <span class="header-logo-text">Vn<span>Stat</span></span>
      </a>

      <div class="header-sep"></div>

      <div class="header-status-pill" id="headerStatusPill">
        <div class="header-status-dot" id="headerStatusDot"></div>
        <span id="headerStatusText">—</span>
      </div>
    </div>

    <div class="header-right">
      <button class="btn-refresh" onclick="refreshAll()" title="Atualizar dados">
        <i class="fa-solid fa-rotate-right" id="refreshIcon"></i> Atualizar
      </button>
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-circle-user"></i> —</div>
      <button class="btn-logout" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </header>

  <main>

    <div class="section-header">
      <div class="section-title">
        <i class="fa-solid fa-chart-pie"></i> Agregado Total
      </div>
      <div class="section-meta" id="kpiMeta">—</div>
    </div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-header" style="margin-top: 36px;">
      <div class="section-title">
        <i class="fa-solid fa-network-wired"></i> Hosts
      </div>
      <div class="section-meta" id="hostsMeta">—</div>
    </div>
    <div class="hosts-grid" id="hostsGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-header" style="margin-top: 36px;">
      <div class="section-title">
        <i class="fa-solid fa-chart-line"></i> Tráfego
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-header-left">
            <i class="fa-solid fa-calendar-week"></i>
            <span class="chart-title">Últimos 30 dias</span>
          </div>
          <span class="chart-badge">por host</span>
        </div>
        <canvas id="dailyChart"></canvas>
        <div id="dailyChartEmpty" style="display:none;" class="empty-msg">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span>Aguardando dados (próximos ciclos do coletor)</span>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-header-left">
            <i class="fa-solid fa-calendar-days"></i>
            <span class="chart-title">Últimos 12 meses</span>
          </div>
          <span class="chart-badge">agregado</span>
        </div>
        <canvas id="monthlyChart"></canvas>
        <div id="monthlyChartEmpty" style="display:none;" class="empty-msg">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span>Aguardando dados mensais</span>
        </div>
      </div>
    </div>

    <div class="last-updated">
      <i class="fa-solid fa-clock"></i>
      <span id="lastUpdatedTime">—</span>
      &nbsp;·&nbsp; auto-refresh a cada 30s
    </div>

  </main>

  <script>
    // ── State ────────────────────────────────────────────────────────────
    let dailyChartInstance = null;
    let monthlyChartInstance = null;

    const CHART_FONTS = { family: 'IBM Plex Mono, monospace' };
    const RX_COLORS = ['#38bdf8', '#34d399', '#a78bfa'];
    const TX_COLORS = ['#f472b6', '#fb923c', '#facc15'];

    // ── Init ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadUser();
      loadOverview();
      loadCharts();
      setInterval(() => { loadOverview(); }, 30000);
    });

    async function refreshAll() {
      const icon = document.getElementById('refreshIcon');
      icon.style.animation = 'spin .6s linear infinite';
      await Promise.all([loadOverview(), loadCharts()]);
      icon.style.animation = '';
    }

    // ── Auth ─────────────────────────────────────────────────────────────
    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        document.getElementById('userBadge').innerHTML =
          `<i class="fa-solid fa-circle-user"></i> ${data.username}`;
      } catch (err) {
        console.error('loadUser:', err);
      }
    }

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST' }); } finally {
        window.location.href = '/login';
      }
    }

    // ── Overview ─────────────────────────────────────────────────────────
    async function loadOverview() {
      try {
        const res = await fetch('/api/overview');
        const data = await res.json();

        // Status pill
        const onlineCount = data.hosts.filter(h => h.online).length;
        const totalCount = data.hosts.length;
        const allOnline = onlineCount === totalCount;
        const dot = document.getElementById('headerStatusDot');
        const txt = document.getElementById('headerStatusText');
        dot.className = 'header-status-dot' + (allOnline ? '' : ' offline');
        txt.textContent = `${onlineCount}/${totalCount} hosts online`;

        // Meta
        document.getElementById('kpiMeta').textContent = `${totalCount} hosts rastreados`;
        document.getElementById('hostsMeta').textContent =
          `${onlineCount} online · ${totalCount - onlineCount} offline`;

        // KPIs
        renderKPIs(data);

        // Hosts
        renderHosts(data.hosts);

        // Timestamp
        const now = new Date();
        document.getElementById('lastUpdatedTime').textContent =
          `Atualizado às ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

      } catch (err) {
        console.error('loadOverview:', err);
      }
    }

    function renderKPIs(data) {
      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-label">Total Recebido</div>
            <i class="fa-solid fa-cloud-arrow-down kpi-icon"></i>
          </div>
          <div class="kpi-value rx">${data.total_rx_fmt}</div>
          <div class="kpi-subtext">${formatBytes(data.total_rx)} bruto</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-label">Total Enviado</div>
            <i class="fa-solid fa-cloud-arrow-up kpi-icon"></i>
          </div>
          <div class="kpi-value tx">${data.total_tx_fmt}</div>
          <div class="kpi-subtext">${formatBytes(data.total_tx)} bruto</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-label">Total Combinado</div>
            <i class="fa-solid fa-arrow-right-arrow-left kpi-icon"></i>
          </div>
          <div class="kpi-value">${formatBytes((data.total_rx || 0) + (data.total_tx || 0))}</div>
          <div class="kpi-subtext">RX + TX acumulado</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-label">Este Mês</div>
            <i class="fa-solid fa-calendar-days kpi-icon"></i>
          </div>
          <div class="kpi-split">
            <div class="kpi-split-item">
              <div class="kpi-split-value rx">${data.month_rx_fmt}</div>
              <div class="kpi-split-label"><i class="fa-solid fa-arrow-down" style="color:var(--rx)"></i> Down</div>
            </div>
            <div class="kpi-split-item">
              <div class="kpi-split-value tx">${data.month_tx_fmt}</div>
              <div class="kpi-split-label"><i class="fa-solid fa-arrow-up" style="color:var(--tx)"></i> Up</div>
            </div>
          </div>
        </div>

        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-label">Hosts Online</div>
            <i class="fa-solid fa-network-wired kpi-icon"></i>
          </div>
          <div class="kpi-value green">${data.hosts.filter(h => h.online).length}<span style="font-size:16px;color:var(--muted);font-weight:400">/${data.hosts.length}</span></div>
          <div class="kpi-subtext">${data.hosts.filter(h => !h.online).length} offline agora</div>
        </div>
      `;
    }

    function renderHosts(hosts) {
      document.getElementById('hostsGrid').innerHTML = hosts.map(h => `
        <div class="host-card" onclick="goToHost('${h.name}')">
          <div class="host-card-header">
            <div class="host-title-wrapper">
              <i class="fa-solid fa-server host-icon"></i>
              <div class="host-name">${h.display_name}</div>
            </div>
            <div class="host-status ${h.online ? 'online' : 'offline'}"
                 title="${h.online ? 'Online' : 'Offline'}"></div>
          </div>
          <div class="host-stats">
            <div class="host-stat">
              <div class="host-stat-label">
                <i class="fa-solid fa-arrow-down" style="color:var(--rx)"></i> Recebido
              </div>
              <div class="host-stat-value rx">${h.rx_total_fmt}</div>
            </div>
            <div class="host-stat">
              <div class="host-stat-label">
                <i class="fa-solid fa-arrow-up" style="color:var(--tx)"></i> Enviado
              </div>
              <div class="host-stat-value tx">${h.tx_total_fmt}</div>
            </div>
          </div>
          <div class="host-card-footer">
            <span class="host-card-footer-label">Ver detalhes</span>
            <i class="fa-solid fa-arrow-right host-card-arrow"></i>
          </div>
        </div>
      `).join('');
    }

    // ── Charts ───────────────────────────────────────────────────────────
    const baseOpts = () => ({
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#94a3b8',
            font: { ...CHART_FONTS, size: 10 },
            padding: 16,
            boxWidth: 9,
            boxHeight: 9
          }
        },
        tooltip: {
          backgroundColor: '#0d1117',
          borderColor: '#1e293b',
          borderWidth: 1,
          titleFont: { ...CHART_FONTS, size: 12 },
          bodyFont: { ...CHART_FONTS, size: 11 },
          padding: 10,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${formatBytes(ctx.parsed.y)}` },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,41,59,0.5)' },
          ticks: { color: '#475569', maxTicksLimit: 10, font: { ...CHART_FONTS, size: 10 } }
        },
        y: {
          grid: { color: 'rgba(30,41,59,0.5)' },
          ticks: { color: '#475569', font: { ...CHART_FONTS, size: 10 }, callback: v => formatBytes(v) }
        },
      },
    });

    async function loadCharts() {
      try {
        const [daily, monthly] = await Promise.all([
          apiFetch('/api/chart/daily?days=30'),
          apiFetch('/api/chart/monthly'),
        ]);

        // Helper rápido para alternar exibição de container vazio
        const toggleChartContainer = (id, hasData) => {
          document.getElementById(id).style.display = hasData ? '' : 'none';
          document.getElementById(`${id}Empty`).style.display = hasData ? 'none' : 'flex';
        };

        // Daily Chart
        const hasDaily = daily?.labels?.length > 0;
        toggleChartContainer('dailyChart', hasDaily);

        if (hasDaily) {
          const ctx = document.getElementById('dailyChart').getContext('2d');
          if (dailyChartInstance) dailyChartInstance.destroy();

          const hostNames = [...new Set(daily.datasets.map(d => d.host))];
          const datasets = [];

          hostNames.forEach((host, i) => {
            const rx = daily.datasets.find(d => d.host === host && d.type === 'rx');
            const tx = daily.datasets.find(d => d.host === host && d.type === 'tx');
            const config = { borderRadius: 3, borderWidth: 1, data: [] };

            if (rx) datasets.push({ ...config, label: rx.label, data: rx.data.map(Number), backgroundColor: RX_COLORS[i % 3] + 'bb', borderColor: RX_COLORS[i % 3] });
            if (tx) datasets.push({ ...config, label: tx.label, data: tx.data.map(Number), backgroundColor: TX_COLORS[i % 3] + 'bb', borderColor: TX_COLORS[i % 3] });
          });

          dailyChartInstance = new Chart(ctx, { type: 'bar', data: { labels: daily.labels, datasets }, options: baseOpts() });
        }

        // Monthly Chart
        const hasMonthly = monthly?.labels?.length > 0;
        toggleChartContainer('monthlyChart', hasMonthly);

        if (hasMonthly) {
          const ctx = document.getElementById('monthlyChart').getContext('2d');
          if (monthlyChartInstance) monthlyChartInstance.destroy();

          const datasets = [];
          monthly.datasets.forEach((ds, i) => {
            const c = RX_COLORS[i % 3];
            datasets.push({ label: `${ds.label} ↓`, data: (ds.rx || []).map(Number), borderColor: c, backgroundColor: c + '22', borderWidth: 2, tension: 0.4, fill: true, pointRadius: 3, pointHoverRadius: 5 });
            datasets.push({ label: `${ds.label} ↑`, data: (ds.tx || []).map(Number), borderColor: c + '88', backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.4, fill: false, borderDash: [4, 3], pointRadius: 2, pointHoverRadius: 4 });
          });

          monthlyChartInstance = new Chart(ctx, { type: 'line', data: { labels: monthly.labels, datasets }, options: baseOpts() });
        }
      } catch (err) {
        console.error('[charts]', err);
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    async function apiFetch(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function goToHost(name) {
      window.location.href = `/host/${name}`;
    }
  </script>
</body>

</html>
