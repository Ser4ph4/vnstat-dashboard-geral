<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vnstat — Host Details</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e14;
      --surface: #0f1520;
      --surface2: #151d2b;
      --surface3: #1a2332;
      --border: #1e293b;
      --border-light: #2d3e52;
      --accent: #38bdf8;
      --accent2: #34d399;
      --accent3: #818cf8;
      --accent-warm: #f97316;
      --text: #e2e8f0;
      --text-dim: #cbd5e1;
      --muted: #64748b;
      --rx: #38bdf8;
      --tx: #f472b6;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Grid & Radial background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 80% at 50% 0%, #0f172a44 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, var(--surface) 0%, rgba(15, 21, 32, 0.8) 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-back {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: var(--mono);
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-back:hover {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: rgba(249, 115, 22, 0.1);
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.15);
    }

    .host-title {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.5px;
    }

    .host-title i {
      color: var(--accent);
      font-size: 16px;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 32px 24px 120px;
      max-width: 1480px;
      margin: 0 auto;
      width: 100%;
      overflow-y: auto;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 32px 0 18px 0;
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .section-title i {
      color: var(--accent);
      font-size: 14px;
    }

    /* ── KPI Grid ───────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity .3s;
    }

    .kpi-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.2);
      transform: translateY(-2px);
    }

    .kpi-card:hover::before {
      opacity: 1;
    }

    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }

    .kpi-icon {
      font-size: 16px;
      color: var(--accent);
      transition: all .3s;
    }

    .kpi-card:hover .kpi-icon {
      transform: scale(1.2) rotate(5deg);
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .kpi-value.rx {
      background: linear-gradient(135deg, var(--rx), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .kpi-value.tx {
      background: linear-gradient(135deg, var(--tx), var(--accent-warm));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Charts ────────────────────────────────────────────────────── */
    .chart-card {
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
      transition: all .3s;
    }

    .chart-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.15);
    }

    .chart-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
    }

    .chart-header i {
      color: var(--accent);
      font-size: 14px;
    }

    canvas {
      max-height: 300px;
    }

    /* ── Loading Spinner ────────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      width: 100%;
      padding: 20px 0;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(15, 21, 32, 0) 0%, var(--surface) 50%, var(--surface) 100%);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .footer-content {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
      justify-content: flex-end;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-family: var(--mono);
      padding: 8px 14px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 8px;
      transition: all .3s;
    }

    .api-status:hover {
      background: rgba(56, 189, 248, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
    }

    .api-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse-status 2s ease-in-out infinite;
      box-shadow: 0 0 6px #34d399;
    }

    .api-status-dot.error {
      background: #ef4444;
      animation: pulse-status-error 1s ease-in-out infinite;
      box-shadow: 0 0 6px #ef4444;
    }

    @keyframes pulse-status {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px #34d399;
      }

      50% {
        opacity: 0.6;
        box-shadow: 0 0 3px #34d399;
      }
    }

    @keyframes pulse-status-error {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px #ef4444;
      }

      50% {
        opacity: 0.5;
        box-shadow: 0 0 3px #ef4444;
      }
    }

    .api-status-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .api-status-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .api-status-value {
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
    }

    .api-status-value.error {
      color: #ef4444;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      main {
        padding: 24px 16px 140px;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      footer {
        padding: 12px 16px;
      }

      .footer-content {
        gap: 12px;
      }

      .api-status {
        padding: 6px 10px;
        font-size: 11px;
      }

      .api-status-text {
        gap: 1px;
      }

      .api-status-label {
        font-size: 9px;
      }

      .api-status-value {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-left">
      <button class="btn-back" onclick="window.history.back()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>
      <div class="host-title" id="hostTitle">
        <i class="fa-solid fa-server"></i> —
      </div>
    </div>
  </header>

  <main>
    <div class="section-title"><i class="fa-solid fa-gauge-high"></i> Estatísticas Atuais</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading">
        <div class="spinner"></div> Carregando...
      </div>
    </div>

    <div class="section-title"><i class="fa-solid fa-calendar-day"></i> Últimos 30 dias</div>
    <div class="chart-card">
      <div class="chart-header">
        <i class="fa-solid fa-chart-bar"></i>
        <div class="chart-title">Tráfego Diário</div>
      </div>
      <canvas id="dailyChart"></canvas>
    </div>

    <div class="section-title"><i class="fa-solid fa-calendar-days"></i> Últimos 12 meses</div>
    <div class="chart-card">
      <div class="chart-header">
        <i class="fa-solid fa-chart-line"></i>
        <div class="chart-title">Tráfego Mensal</div>
      </div>
      <canvas id="monthlyChart"></canvas>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="api-status" id="apiStatus">
        <div class="api-status-dot"></div>
        <div class="api-status-text">
          <div class="api-status-label">API Status</div>
          <div class="api-status-value">—</div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const hostName = new URLSearchParams(window.location.search).get('h') ||
      window.location.pathname.split('/').pop();
    let chartsInstances = {};
    let apiLatency = 0;

    document.addEventListener('DOMContentLoaded', () => {
      loadHostDetail();
      checkApiStatus();
      setInterval(loadHostDetail, 30000);
      setInterval(checkApiStatus, 5000);
    });

    async function checkApiStatus() {
      try {
        const startTime = performance.now();
        const res = await fetch('/api/health', { method: 'HEAD' });
        const endTime = performance.now();
        apiLatency = Math.round(endTime - startTime);

        const statusEl = document.getElementById('apiStatus');
        const dot = statusEl.querySelector('.api-status-dot');
        const value = statusEl.querySelector('.api-status-value');

        if (res.ok) {
          dot.classList.remove('error');
          value.classList.remove('error');
          value.textContent = `${apiLatency}ms`;
        } else {
          dot.classList.add('error');
          value.classList.add('error');
          value.textContent = 'Erro';
        }
      } catch (err) {
        const statusEl = document.getElementById('apiStatus');
        const dot = statusEl.querySelector('.api-status-dot');
        const value = statusEl.querySelector('.api-status-value');
        dot.classList.add('error');
        value.classList.add('error');
        value.textContent = 'Desconectado';
        console.error('API status check failed:', err);
      }
    }

    async function loadHostDetail() {
      try {
        const res = await fetch(`/api/host/${hostName}`);
        const data = await res.json();

        document.getElementById('hostTitle').innerHTML = `<i class="fa-solid fa-server"></i> ${data.host.display_name}`;

        const c = data.current || {};
        document.getElementById('kpiGrid').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Recebido</div>
              <i class="fa-solid fa-cloud-arrow-down kpi-icon"></i>
            </div>
            <div class="kpi-value rx">${c.rx_total_fmt || '—'}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-header">
              <div class="kpi-label">Total Enviado</div>
              <i class="fa-solid fa-cloud-arrow-up kpi-icon"></i>
            </div>
            <div class="kpi-value tx">${c.tx_total_fmt || '—'}</div>
          </div>
        `;

        const chartBaseOpts = {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { labels: { color: '#cbd5e1', font: { family: "IBM Plex Mono, monospace", size: 11 }, padding: 16, usePointStyle: true } },
            tooltip: {
              backgroundColor: '#0f172a',
              borderColor: '#38bdf8',
              borderWidth: 1,
              titleFont: { family: "IBM Plex Mono, monospace", size: 12 },
              bodyFont: { family: "IBM Plex Mono, monospace", size: 11 },
              callbacks: { label: ctx => `${ctx.dataset.label}: ${formatBytes(ctx.parsed.y)}` },
            },
          },
          scales: {
            x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { family: "IBM Plex Mono, monospace", size: 10 } } },
            y: {
              grid: { color: '#1e293b' },
              ticks: { color: '#64748b', font: { family: "IBM Plex Mono, monospace", size: 10 }, callback: v => formatBytes(v) },
            },
          },
        };

        // Daily Chart
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        if (chartsInstances.daily) chartsInstances.daily.destroy();
        chartsInstances.daily = new Chart(dailyCtx, {
          type: 'bar',
          data: {
            labels: data.days.map(d => d.date),
            datasets: [
              {
                label: 'Download (↓)',
                data: data.days.map(d => d.rx),
                backgroundColor: '#38bdf8cc',
                borderColor: '#38bdf8',
                borderWidth: 1,
                borderRadius: 3,
              },
              {
                label: 'Upload (↑)',
                data: data.days.map(d => d.tx),
                backgroundColor: '#f472b6cc',
                borderColor: '#f472b6',
                borderWidth: 1,
                borderRadius: 3,
              },
            ],
          },
          options: {
            ...chartBaseOpts,
            interaction: { mode: 'index', intersect: false },
          },
        });

        // Monthly Chart
        const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
        if (chartsInstances.monthly) chartsInstances.monthly.destroy();
        chartsInstances.monthly = new Chart(monthlyCtx, {
          type: 'line',
          data: {
            labels: data.months.map(m => m.label),
            datasets: [
              {
                label: 'Download (↓)',
                data: data.months.map(m => m.rx),
                borderColor: '#38bdf8',
                backgroundColor: '#38bdf81a',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6,
              },
              {
                label: 'Upload (↑)',
                data: data.months.map(m => m.tx),
                borderColor: '#f472b6',
                backgroundColor: '#f472b61a',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6,
              },
            ],
          },
          options: {
            ...chartBaseOpts,
            interaction: { mode: 'index', intersect: false },
          },
        });
      } catch (err) {
        console.error('Load error:', err);
      }
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }
  </script>
</body>

</html>
